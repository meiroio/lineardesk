services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lineardesk
      POSTGRES_USER: lineardesk
      POSTGRES_PASSWORD: lineardesk
    ports:
      - "5433:5432"
    volumes:
      - lineardesk_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lineardesk -d lineardesk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lineardesk_pg:
